<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0f172a"/>
  <g transform="translate(256,256)">
    <!-- Rays -->
    <g stroke="#f97316" stroke-width="28" stroke-linecap="round">
      <line y1="-150" y2="-110"/>
      <line y1="-150" y2="-110" transform="rotate(45)"/>
      <line y1="-150" y2="-110" transform="rotate(90)"/>
      <line y1="-150" y2="-110" transform="rotate(135)"/>
      <line y1="-150" y2="-110" transform="rotate(180)"/>
      <line y1="-150" y2="-110" transform="rotate(225)"/>
      <line y1="-150" y2="-110" transform="rotate(270)"/>
      <line y1="-150" y2="-110" transform="rotate(315)"/>
    </g>
    <!-- Sun body -->
    <circle r="80" fill="#f97316"/>
    <!-- Horizon line -->
    <line x1="-160" y1="40" x2="160" y2="40" stroke="#e2e8f0" stroke-width="20" stroke-linecap="round"/>
    <!-- Mask lower half of sun below horizon -->
    <rect x="-90" y="40" width="180" height="90" fill="#0f172a"/>
  </g>
</svg>
